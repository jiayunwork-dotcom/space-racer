version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: space-racer-redis
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: space-racer-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
    depends_on:
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    command: sh -c "npm run build && node dist/index.js"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: space-racer-client
    ports:
      - "8088:80"
    depends_on:
      - server

volumes:
  redis_data:
